<!DOCTYPE html>
<html lang="cs">

    }

    }

</head>
<body>
<div class="app">

<script>

let quiz = [];
let index = 0;
let points = 0;
let locked = false;
let started = false;

let timerInterval = null;
let revealTimeout = null;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

let audioCtx = null;

function ensureAudio() {
  try {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === "suspended") audioCtx.resume();
  } catch(e) {}
}

function sound(freq1, freq2, length=0.24, gainMax=0.50, type="triangle") {
  try {
    ensureAudio();
    if (!audioCtx) return;
    const now = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.frequency.setValueAtTime(freq1, now);
    if (freq2 && freq2 !== freq1) osc.frequency.exponentialRampToValueAtTime(freq2, now + length * 0.75);
    gain.gain.setValueAtTime(0.0001, now);
    gain.gain.exponentialRampToValueAtTime(gainMax, now + 0.015);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + length);
    osc.start(now);
    osc.stop(now + length + 0.04);
  } catch(e) {}
}

function soundGood() {
  sound(720, 980, .18, .42, "triangle");
  setTimeout(() => sound(980, 1320, .16, .42, "triangle"), 115);
  setTimeout(() => sound(1320, 1560, .14, .35, "triangle"), 230);
}

function soundBad() {
  sound(620, 360, 0.22, 0.70, "square");
  setTimeout(() => sound(520, 260, 0.24, 0.70, "square"), 210);
}

function soundTick() { sound(520, 520, .05, .16, "sine"); }

function soundCheat() {
  sound(1400, 300, .30, .75, "sawtooth");
  setTimeout(() => sound(300, 1400, .30, .75, "sawtooth"), 300);
  setTimeout(() => sound(1400, 250, .42, .80, "sawtooth"), 620);
}

function soundEnd(pass) { pass ? soundGood() : soundBad(); }

function checkApplicationStatus() {
  return new Promise(resolve => {
    const callbackName = "stavAplikaceCallback_" + Date.now() + "_" + Math.floor(Math.random() * 100000);
    const script = document.createElement("script");
    let done = false;
    function cleanup() {
      try { delete window[callbackName]; } catch(e) { window[callbackName] = undefined; }
      if (script && script.parentNode) script.parentNode.removeChild(script);
    }
    window[callbackName] = function(data) {
      if (done) return;
      done = true;
      cleanup();
      const stav = (data && data.stav ? String(data.stav) : "SPUŠTĚNO").trim().toUpperCase();
      resolve(stav);
    };
    script.onerror = function() {
      if (done) return;
      done = true;
      cleanup();
      resolve("SPUŠTĚNO");
    };
    const separator = WEB_APP_URL.includes("?") ? "&" : "?";
    script.src = WEB_APP_URL + separator + "action=status&callback=" + encodeURIComponent(callbackName) + "&t=" + Date.now();
    document.body.appendChild(script);
    setTimeout(() => {
      if (done) return;
      done = true;
      cleanup();
      resolve("SPUŠTĚNO");
    }, 4500);
  });
}

function showStartStatus(message, type) {
  const el = document.getElementById("startStatus");
  if (!el) return;
  el.textContent = message || "";
  el.className = type === "blocked" ? "blockedMessage" : (type === "checking" ? "checkingMessage" : "small center");
}

async function startQuiz() {
  ensureAudio();
  const surname = document.getElementById("surname").value.trim();
  const className = document.getElementById("className").value.trim();
  if (!surname || !className) {
    alert("Vyplň prosím příjmení i třídu.");
    return;
  }
  const startBtn = document.getElementById("startBtn");
  if (startBtn) startBtn.disabled = true;
  showStartStatus("Ověřuji, zda je aplikace spuštěna…", "checking");
  let stavAplikace = "SPUŠTĚNO";
  try { stavAplikace = await checkApplicationStatus(); } catch(e) { stavAplikace = "SPUŠTĚNO"; }
  if (stavAplikace === "ZABLOKOVÁNO" || stavAplikace === "ZABLOKOVANO") {
    showStartStatus("APLIKACI NELZE SPUSTIT – TEST JE DOČASNĚ ZABLOKOVÁN.", "blocked");
    if (startBtn) startBtn.disabled = false;
    return;
  }
  showStartStatus("", "");
  if (startBtn) startBtn.disabled = false;
  quiz = shuffle(QUESTIONS).slice(0, TEST_COUNT);
  index = 0;
  points = 0;
  locked = false;
  started = true;
  finished = false;
  document.getElementById("screenStart").classList.add("hidden");
  document.getElementById("screenResult").classList.add("hidden");
  document.getElementById("screenQuiz").classList.remove("hidden");
  renderQuestion();
}

function renderQuestion() {
  clearTimers();
  locked = false;
  timeLeft = QUESTION_TIME;
  const item = quiz[index];
  document.getElementById("progress").textContent = `Otázka ${index + 1}/${quiz.length}`;
  document.getElementById("score").textContent = `Body: ${points}`;
  document.getElementById("topicBadge").textContent = item.cast || "ROMANTISMUS";
  document.getElementById("question").textContent = item.q;
  document.getElementById("feedback").textContent = "";
  document.getElementById("feedback").className = "feedback";
  document.getElementById("answerReveal").className = "answerReveal hidden";
  document.getElementById("answerReveal").textContent = "";
  document.getElementById("answerBox").classList.remove("hidden");
  const answerInput = document.getElementById("studentAnswer");
  answerInput.value = "";
  answerInput.disabled = false;
  document.getElementById("confirmBtn").disabled = false;
  updateTimerDisplay();
  setTimeout(() => answerInput.focus(), 80);
  timerInterval = setInterval(() => {
    timeLeft -= 1;
    updateTimerDisplay();
    if (timeLeft <= 3 && timeLeft > 0) soundTick();
    if (timeLeft <= 0) handleWrongOrTimeout();
  }, 1000);
}

function updateTimerDisplay() {
  document.getElementById("timeText").textContent = `Čas: ${Math.max(0, timeLeft)} s`;
}

function stripDiacritics(s) {
  return String(s || "").normalize("NFD").replace(/[\u0300-\u036f]/g, "");
}

function normalizeAnswer(s) {
  return stripDiacritics(String(s || ""))
    .toLowerCase()
    .replace(/[.,;:!?„“\"'()\[\]{}]/g, " ")
    .replace(/\s+/g, " ")
    .trim();
}

function levenshtein(a, b) {
  a = normalizeAnswer(a);
  b = normalizeAnswer(b);
  const m = a.length, n = b.length;
  if (Math.abs(m - n) > 1) {
    // Pro naše účely stačí vědět, že vzdálenost nebude <= 1.
    // Plnou tabulku i tak počítáme níže pro krátké výjimky nepotřebujeme.
  }
  const dp = Array.from({length:m+1}, () => Array(n+1).fill(0));
  for (let i=0; i<=m; i++) dp[i][0] = i;
  for (let j=0; j<=n; j++) dp[0][j] = j;
  for (let i=1; i<=m; i++) {
    for (let j=1; j<=n; j++) {
      const cost = a[i-1] === b[j-1] ? 0 : 1;
      dp[i][j] = Math.min(dp[i-1][j] + 1, dp[i][j-1] + 1, dp[i-1][j-1] + cost);
    }
  }
  return dp[m][n];
}

function isCorrectAnswer(input, item) {
  const user = normalizeAnswer(input);
  if (!user) return false;
  return item.answers.some(ans => {
    const expected = normalizeAnswer(ans);
    return user === expected || levenshtein(user, expected) <= 1;
  });
}

function submitAnswer() {
  ensureAudio();
  if (locked || finished) return;
  const item = quiz[index];
  const value = document.getElementById("studentAnswer").value.trim();
  if (!value) {
    soundBad();
    document.getElementById("feedback").textContent = "DOPLŇ ODPOVĚĎ";
    document.getElementById("feedback").className = "feedback bad";
    return;
  }
  locked = true;
  clearInterval(timerInterval);
  document.getElementById("studentAnswer").disabled = true;
  document.getElementById("confirmBtn").disabled = true;
  const ok = isCorrectAnswer(value, item);
  revealAnswer(ok, value);
}

function revealAnswer(ok, userAnswer) {
  const item = quiz[index];
  const reveal = document.getElementById("answerReveal");
  reveal.classList.remove("hidden");
  if (ok) {
    points++;
    reveal.className = "answerReveal correctReveal";
    reveal.textContent = `Správně: ${item.display}`;
    document.getElementById("feedback").textContent = "SPRÁVNĚ";
    document.getElementById("feedback").className = "feedback good";
    document.getElementById("score").textContent = `Body: ${points}`;
    soundGood();
  } else {
    reveal.className = "answerReveal wrongReveal";
    reveal.textContent = `Správná odpověď: ${item.display}`;
    document.getElementById("feedback").textContent = "CHYBA";
    document.getElementById("feedback").className = "feedback bad";
    soundBad();
  }
  revealTimeout = setTimeout(nextQuestionAuto, REVEAL_TIME);
}

function handleWrongOrTimeout() {
  if (locked || finished) return;
  locked = true;
  clearInterval(timerInterval);
  document.getElementById("studentAnswer").disabled = true;
  document.getElementById("confirmBtn").disabled = true;
  const item = quiz[index];
  const reveal = document.getElementById("answerReveal");
  reveal.className = "answerReveal wrongReveal";
  reveal.textContent = `Správná odpověď: ${item.display}`;
  reveal.classList.remove("hidden");
  document.getElementById("feedback").textContent = "ČAS VYPRŠEL";
  document.getElementById("feedback").className = "feedback bad";
  soundBad();
  revealTimeout = setTimeout(nextQuestionAuto, REVEAL_TIME);
}

function nextQuestionAuto() {
  index++;
  if (index >= quiz.length) finishQuiz(false);
  else renderQuestion();
}

function clearTimers() {
  clearInterval(timerInterval);
  clearTimeout(revealTimeout);
}

function getGrade(score) {
  if (score >= 14) return "1";
  if (score >= 12) return "2";
  if (score >= 9) return "3";
  if (score >= 7) return "4";
  return "5";
}

function finishQuiz(byCheat) {
  if (finished) return;
  finished = true;
  started = false;
  clearTimers();
  clearTimeout(cheatTimer);
  const passed = !byCheat && points >= PASS_LIMIT;
  const grade = byCheat ? "5" : getGrade(points);
  const vysledekText = byCheat ? "neplatné" : (passed ? "USPĚL" : "NEUSPĚL");
  const znamka = byCheat ? "5" : grade;
  const note = byCheat
    ? "Test ukončen: opuštění okna aplikace / podezření na podvod."
    : (passed ? `Splněno. Známka: ${grade}.` : `Nesplněno. Známka: ${grade}.`);
  document.getElementById("screenQuiz").classList.add("hidden");
  document.getElementById("screenResult").classList.remove("hidden");
  document.getElementById("finalTitle").textContent = byCheat ? "TEST UKONČEN" : vysledekText;
  document.getElementById("finalText").innerHTML = byCheat
    ? `
      <div class="resultScore"><div class="resultLabel">ZÍSKANÉ BODY</div><div class="resultValue">${points}/${quiz.length}</div></div>
      <div class="resultScore"><div class="resultLabel">ZNÁMKA</div><div class="resultGrade">5</div></div>
      <p class="small">Aplikace zaznamenala opuštění testu.</p>
    `
    : `
      <div class="resultScore"><div class="resultLabel">ZÍSKANÉ BODY</div><div class="resultValue">${points}/${quiz.length}</div></div>
      <div class="resultScore"><div class="resultLabel">ZNÁMKA</div><div class="resultGrade">${grade}</div></div>
      <p class="small">Klasifikace: 16–14 = 1, 13–12 = 2, 11–9 = 3, 8–7 = 4, 6–0 = 5.</p>
    `;
  if (byCheat) soundCheat(); else soundEnd(passed);
  sendResult(znamka, note, vysledekText);
}

function goMenu() {
  clearTimers();
  document.getElementById("screenQuiz").classList.add("hidden");
  document.getElementById("screenResult").classList.add("hidden");
  document.getElementById("screenStart").classList.remove("hidden");
  document.getElementById("surname").value = "";
  document.getElementById("className").value = "";
  document.getElementById("surname").focus();
}

function sendResult(znamka, note, vysledekText) {
  const status = document.getElementById("sendStatus");
  if (!WEB_APP_URL) {
    status.textContent = "Výsledek nebyl odeslán – v HTML je nutné doplnit URL Apps Scriptu.";
    return;
  }
  const data = new URLSearchParams();
  data.append("timestamp", new Date().toISOString());
  data.append("aplikace", APP_NAME);
  data.append("trida", document.getElementById("className").value.trim());
  data.append("prijmeni", document.getElementById("surname").value.trim());
  data.append("jmeno", document.getElementById("surname").value.trim());
  data.append("vysledek", vysledekText || znamka);
  data.append("znamka", znamka);
  data.append("body", String(points));
  data.append("celkem", String(quiz.length));
  data.append("spravne", String(points));
  data.append("spatne", String(quiz.length - points));
  data.append("rezim", note.includes("opuštění") ? "PŘEKLIKNUTÍ" : "TEST");
  data.append("poznamka", note);
  data.append("odeslano", new Date().toLocaleString("cs-CZ"));
  data.append("technika", "skryty_formular_iframe");
  const iframeName = "odesilaci_iframe";
  let iframe = document.querySelector('iframe[name="' + iframeName + '"]');
  if (!iframe) {
    iframe = document.createElement("iframe");
    iframe.name = iframeName;
    iframe.style.display = "none";
    document.body.appendChild(iframe);
  }
  const form = document.createElement("form");
  form.method = "POST";
  form.action = WEB_APP_URL;
  form.target = iframeName;
  form.style.display = "none";
  for (const [key, value] of data.entries()) {
    const input = document.createElement("input");
    input.type = "hidden";
    input.name = key;
    input.value = value;
    form.appendChild(input);
  }
  document.body.appendChild(form);
  form.submit();
  status.textContent = "Výsledek byl odeslán do tabulky.";
  setTimeout(() => form.remove(), 1500);
}

document.addEventListener("visibilitychange", () => {
  if (!started || finished) return;
  if (document.hidden) {
    cheatTimer = setTimeout(() => {
      if (started && !finished && document.hidden) finishQuiz(true);
    }, 1200);
  } else {
    clearTimeout(cheatTimer);
  }
});

const startBtnElement = document.getElementById("startBtn");
if (startBtnElement) startBtnElement.addEventListener("click", startQuiz);

const confirmBtnElement = document.getElementById("confirmBtn");
if (confirmBtnElement) confirmBtnElement.addEventListener("click", submitAnswer);

document.getElementById("studentAnswer").addEventListener("keydown", function(e) {
  if (e.key === "Enter") {
    e.preventDefault();
    submitAnswer();
  }
});

window.addEventListener("pagehide", () => {
  if (started && !finished) finishQuiz(true);
});
</script>
